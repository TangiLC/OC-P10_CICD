name: Build and Test for Sonar Analyze
run-name: ${{ github.actor }} | Full Build for Sonar Analyze

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Front-end dependencies
        working-directory: front
        run: npm install

      - name: Install Chrome browser for tests
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Front-end tests with coverage
        working-directory: front
        run: |
          export CHROME_BIN=/usr/bin/google-chrome
          npm test -- --browsers ChromeHeadless --watch=false --code-coverage --karma-config karma.conf.js

      - name: Upload front-end coverage report
        uses: actions/upload-artifact@v4
        with:
          name: front-coverage-report
          path: front/coverage/bobapp/lcov.info

  backend-build-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java & Maven
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install back-end dependencies & Run tests with coverage
        run: |
          cd back
          mvn clean verify

      - name: Upload back-end coverage report
        uses: actions/upload-artifact@v4
        with:
          name: back-coverage-report
          path: back/target/site/jacoco/jacoco.xml

  merge-coverage:
    needs: [frontend-build-test, backend-build-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download front-end coverage report
        uses: actions/download-artifact@v4
        with:
          name: front-coverage-report
          path: coverage/front

      - name: Download back-end coverage report
        uses: actions/download-artifact@v4
        with:
          name: back-coverage-report
          path: coverage/back

      - name: SonarCloud Scan with both Coverages
        uses: Sonarsource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=TangiLC_OC-P10_CICD 
            -Dsonar.organization=tangilc 
            -Dsonar.sources=front/src,back/src 
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts,**/test.ts,**/karma.conf.js,**/environments/** 
            -Dsonar.coverage.exclusions=**/main.ts 
            -Dsonar.javascript.lcov.reportPaths=coverage/merged-coverage.info
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage/back/jacoco.xml
